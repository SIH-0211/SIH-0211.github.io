<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 암호화폐 가격 추적기</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 40px 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
            text-align: center; 
        }
        table { 
            border-collapse: collapse; 
            width: 60%; 
            margin: 30px auto; 
            background-color: #1e1e1e; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); 
        }
        th, td { 
            border: 1px solid #333; 
            padding: 15px; 
            text-align: center; 
        }
        th { 
            background-color: #2c2c2c; 
            color: #ffffff; 
            font-weight: bold;
        }
        .loading { color: #888; font-style: italic; }
        #last-updated { margin-top: 10px; font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>
    <h1>실시간 BTC & ETH 가격 (CoinGecko API)</h1>
    
    <table>
        <thead>
            <tr>
                <th>코인 (Coin)</th>
                <th>심볼 (Symbol)</th>
                <th>실시간 가격 (USD)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Bitcoin</td>
                <td>BTC</td>
                <td id="btc-price" class="loading">데이터 불러오는 중...</td>
            </tr>
            <tr>
                <td>Ethereum</td>
                <td>ETH</td>
                <td id="eth-price" class="loading">데이터 불러오는 중...</td>
            </tr>
        </tbody>
    </table>
    <div id="last-updated">마지막 업데이트: -</div>

    <script>
        async function fetchCryptoPrices() {
            try {
                // 1. 브라우저 캐시를 무력화하기 위한 타임스탬프 생성
                const timestamp = new Date().getTime();
                
                // 2. 프록시 없이 CoinGecko 오리지널 API 주소에 타임스탬프만 추가
                const apiUrl = `https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&_t=${timestamp}`;

                // 3. fetch 요청 (캐시 사용 안 함 설정 추가)
                const response = await fetch(apiUrl, { cache: 'no-store' });
                
                if (!response.ok) {
                    throw new Error(`HTTP 에러: ${response.status}`);
                }
                
                const data = await response.json();
                
                document.getElementById('btc-price').innerText = '$' + data.bitcoin.usd.toLocaleString();
                document.getElementById('btc-price').className = ''; 
                
                document.getElementById('eth-price').innerText = '$' + data.ethereum.usd.toLocaleString();
                document.getElementById('eth-price').className = '';

                const now = new Date();
                document.getElementById('last-updated').innerText = `마지막 업데이트: ${now.toLocaleTimeString()}`;
                
            } catch (error) {
                console.error('API 요청 에러:', error);
                document.getElementById('btc-price').innerText = '데이터 갱신 실패';
                document.getElementById('eth-price').innerText = '데이터 갱신 실패';
            }
        }

        // 최초 1회 실행
        fetchCryptoPrices();
        
        // 60초마다 반복 업데이트 
        setInterval(fetchCryptoPrices, 60000);
    </script>
</body>
</html>
